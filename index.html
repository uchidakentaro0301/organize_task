<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🚙☁ 👀 My Backlog</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/board.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <span class="logo-icon">📋</span>
                    <span class="logo-text">My Backlog</span>
                </div>
                <button class="toggle-btn" onclick="toggleSidebar()">
                    <span id="toggle-icon">❮</span>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <button onclick="showView('board')" id="nav-board" class="nav-item active">
                    <span class="icon">🗂️</span> <span class="nav-text">ボード</span>
                </button>
                <button onclick="showView('dashboard')" id="nav-dashboard" class="nav-item">
                    <span class="icon">📊</span> <span class="nav-text">ダッシュボード</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="slack-collapsible">
                    <div class="slack-header" onclick="toggleSlackSettings()" style="cursor:pointer;">
                        <div class="slack-title-combined">
                            <span class="icon">🔗</span>
                            <span class="nav-text">Slack連携</span>
                        </div>
                        <span id="slackArrow" class="nav-text">▼</span>
                    </div>
                    <div id="slackContent" class="slack-body" style="display: none;">
                        <div class="slack-input-group">
                            <input type="password" id="slackUrl" placeholder="Webhook URLを入力" onchange="saveSlackUrl()" disabled>
                            
                            <button id="slackLockBtn" class="lock-icon-btn" onclick="toggleSlackLock()" title="編集ロック解除">🔒</button>
                            
                            <button class="test-icon-btn" onclick="sendSlackNotification()" title="テスト送信">🚀</button>
                        </div>
                    </div>
                </div>
                <button class="reset-sidebar-btn" onclick="confirmReset()">
                    <span class="icon">⚠️</span> <span class="nav-text">全リセット</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div id="boardView" class="view active">
                <div class="top-action-area">
                    <button class="open-modal-btn" onclick="openTaskModal()">
                        <span class="icon">＋</span> 新しいタスクを追加
                    </button>
                    <button class="template-btn" onclick="openTaskModal(true)" style="border-radius: 14px; border-left: none;">
                        <span class="icon">📋</span> テンプレートから作成
                    </button>
                </div>
                
                <div id="taskModal" class="modal-overlay">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 id="modalTitle">タスク登録</h2>
                            <button class="close-modal" onclick="closeTaskModal()">&times;</button>
                        </div>
                        <div class="modal-body-content">
                            <div id="modalTemplateArea" style="display: none;">
                                <label style="font-size: 0.75rem; color: #6366f1; font-weight: bold;">テンプレートを選択</label>
                                <select id="modal-template-selector" class="modal-input" onchange="handleModalTemplateChange()" style="margin-top: 5px; background: #f8fafc; border: 2px solid #e2e8f0;">
                                    <option value="">-- テンプレートを選んでください --</option>
                                    </select>
                            </div>
                
                            <input type="text" id="taskInput" placeholder="タスク名を入力" class="modal-input">
                            
                            <div class="modal-date-group">
                                <input type="date" id="startDate">
                                <span>→</span>
                                <input type="date" id="endDate">
                            </div>
                            
                            <textarea id="taskDetail" placeholder="メモ・詳細内容" rows="4" class="modal-input"></textarea>
                            
                            <button onclick="addTask()" class="modal-submit-btn">この内容で登録する</button>
                        </div>
                    </div>
                </div>
                <div class="board">
                    <div class="column" id="todo"><h2>未着手</h2><div class="task-list"></div></div>
                    <div class="column" id="doing"><h2>進行中</h2><div class="task-list"></div></div>
                    <div class="column" id="done"><h2>完了</h2><div class="task-list"></div></div>
                </div>
            </div>

            <div id="dashboardView" class="view">
                <div class="dashboard-header"><h1>ダッシュボード</h1></div>
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <div class="stat-header"><h3>全タスク</h3></div>
                        <div class="stat-body"><div id="total-count" class="stat-value">0</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header"><h3>残タスク</h3></div>
                        <div class="stat-body"><div id="remaining-count" class="stat-value">0</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <h3>完了率</h3>
                            <div class="custom-select-wrapper">
                                <select id="period-selector" onchange="updateDashboard()">
                                    <option value="all">全期間</option>
                                    <option value="1w">直近1週間</option>
                                    <option value="1m">直近1ヶ月</option>
                                    <option value="3m">直近3ヶ月</option>
                                    <option value="1y">直近1年</option>
                                </select>
                            </div>
                        </div>
                        <div class="stat-body">
                            <div id="progress-rate" class="stat-value">0%</div>
                            <div id="period-label" class="stat-subtext">全期間の統計</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header"><h3>期限切れ</h3></div>
                        <div class="stat-body"><div id="overdue-count" class="stat-value">0</div></div>
                    </div>
                    <div class="stat-card wide">
                        <div class="stat-header"><h3>ステータス状況</h3></div>
                        <div class="stat-body"><div class="placeholder-box"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="taskModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>新しいタスクを登録</h2>
                <button class="close-modal" onclick="closeTaskModal()">&times;</button>
            </div>
            <div class="modal-body-content">
                <input type="text" id="taskInput" placeholder="タスク名を入力" class="modal-input">
                <div class="modal-date-group">
                    <input type="date" id="startDate">
                    <span>→</span>
                    <input type="date" id="endDate">
                </div>
                <textarea id="taskDetail" placeholder="メモ・詳細内容" rows="4" class="modal-input"></textarea>
                <button onclick="addTask()" class="modal-submit-btn">登録する</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/board.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
